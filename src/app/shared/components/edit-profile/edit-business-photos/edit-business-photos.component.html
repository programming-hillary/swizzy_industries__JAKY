<div class="row">
  <div
    class="dropzone"
    appDropzone
    (hovered)="toggleHover($event)"
    (dropped)="onDrop($event)"
    [class.hovering]="isHovering"
  >
  <p>Business Photos</p>
  <p>Drag and drop</p>
</div>
@for(file of files; track file) {
<app-business-upload-task [file]="file" />
}
</div>
<div class="container d-flex justify-content-center gap-2">
  <button mat-flat-button [disabled]="" matStepperNext>Finalize</button>
</div>
